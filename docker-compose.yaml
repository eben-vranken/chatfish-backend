services:
  mongodb:
    image: mongo:7
    container_name: chatfish-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ChatfishDb
    networks:
      - chatfish-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:latest
    container_name: chatfish-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    networks:
      - chatfish-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: chatfish-backend
    ports:
      - "8080:8080"
    depends_on:
      mongodb:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_AK=${MINIO_AK:-minioadmin}
      - MINIO_SK=${MINIO_SK:-minioadmin}
      - MINIO_USE_SSL=${MINIO_USE_SSL:-true}
      - JWT_AUTHORITY=${JWT_AUTHORITY:-http://localhost:8080}
      - JWT_AUDIENCE=${JWT_AUDIENCE:-chatfish-api}
      - JWT_SECRET=${JWT_SECRET:-verander-dit-in-production}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-mailto:admin@chatfish.com}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-verander-dit-in-production}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-verander-dit-in-production}
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - ChatfishDatabase__ConnectionString=${ChatfishDatabase__ConnectionString:-mongodb://mongodb:27017}
    volumes:
      - ./appsettings.json:/app/appsettings.json:ro
    networks:
      - chatfish-network

volumes:
  mongodb_data:
  minio_data:

networks:
  chatfish-network:
    driver: bridge
