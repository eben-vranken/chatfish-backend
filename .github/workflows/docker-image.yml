name: Docker Image CI

on:
  push:
    branches: [ "feature/azure" ]
  pull_request:
    branches: [ "feature/azure" ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4    
      
    - name: Log in to the Azure Container Registry
      uses: docker/login-action@v3
      with:
        registry: ucllfeg.azurecr.io
        username: ${{ secrets.AZ_SP_CLIENT_ID }}
        password: ${{ secrets.AZ_SP_CLIENT_SECRET }}

    - name: Build the Docker image    
      uses: docker/build-push-action@v5
      with:
        context: .        
        push: true
        tags: ucllfeg.azurecr.io/chatfish-backend:latest
